name: Amazon SageMaker
description: >-
  Amazon SageMaker is a fully managed machine learning platform that enables
  developers and data scientists to build, train, and deploy machine learning
  models at scale. SageMaker removes the heavy lifting from each step of the
  machine learning process, providing built-in algorithms, managed Jupyter
  notebooks, distributed training, automatic model tuning, and one-click
  deployment to production endpoints with auto-scaling.
url: https://aws.amazon.com/sagemaker/
baseURL: https://api.sagemaker.amazonaws.com
x-type: company
created: '2024-01-01'
modified: '2026-04-19'

