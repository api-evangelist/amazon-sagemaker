specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Amazon SageMaker
providerId: amazon-sagemaker
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Amazon
  - AWS
  - Machine Learning
  - AI
  - Notebooks
  - Inference
description: Amazon SageMaker AI is priced per ML instance-hour across notebook, training, batch transform,
  real-time inference, and serverless inference workloads, with rates varying by instance family. SageMaker
  Savings Plans offer up to 64% off on a 1- or 3-year commitment. New accounts get a 2-month Free Tier
  including 250 hours of ml.t3.medium Studio notebooks and 50 hours of m4.xlarge or m5.xlarge training.
  Prices listed are us-east-1 examples.
sources:
  - https://aws.amazon.com/sagemaker-ai/pricing/
plans:
  - id: amazon-sagemaker-free-tier
    name: SageMaker Free Tier (2 months)
    type: freemium
    description: 2-month introductory tier for new accounts.
    entries:
      - label: Studio notebooks (ml.t3.medium)
        name: free_studio_notebook
        type: quota
        metric: instance-hour
        limit: 250
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Training (ml.m4.xlarge or ml.m5.xlarge)
        name: free_training
        type: quota
        metric: instance-hour
        limit: 50
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: First 2 months of new account
      - name: Includes Studio notebooks, training, real-time inference allowances
  - id: amazon-sagemaker-on-demand
    name: SageMaker On-Demand
    type: usage-based
    description: Pay-per-instance-hour across all SageMaker workloads. No upfront commitment.
    entries:
      - label: Notebook instance (ml.c5.xlarge example)
        name: notebook_c5_xlarge
        type: metered
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '0.204'
        userMultiplied: false
      - label: Training (ml.m5.xlarge example)
        name: training_m5_xlarge
        type: metered
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '0.23'
        userMultiplied: false
      - label: Training (ml.m4.4xlarge example)
        name: training_m4_4xlarge
        type: metered
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '0.96'
        userMultiplied: false
      - label: GPU notebook / training (ml.g4dn.xlarge)
        name: notebook_g4dn_xlarge
        type: metered
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '0.7364'
        userMultiplied: false
      - label: Real-time inference (ml.c5.xlarge example)
        name: inference_c5_xlarge
        type: metered
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: '0.204'
        userMultiplied: false
      - label: Serverless inference (compute)
        name: serverless_inference_compute
        type: metered
        metric: gb-second
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see vendor pricing calculator
        userMultiplied: false
      - label: Serverless inference (data processing)
        name: serverless_inference_data
        type: metered
        metric: gb
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see vendor pricing calculator
        userMultiplied: false
      - label: Other ML instance types
        name: other_instances
        type: metered
        metric: instance-hour
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: see vendor pricing calculator
        userMultiplied: false
    elements:
      - name: Instance-hour metering
      - name: Distinct rates for notebook, training, batch transform, real-time, serverless inference
      - name: GPU and Inferentia/Trainium families available
  - id: amazon-sagemaker-savings-plans
    name: SageMaker Savings Plans
    type: subscription
    description: 1- or 3-year commitment in $/hour for SageMaker compute in exchange for up to 64% off
      on-demand.
    entries:
      - label: Savings Plans commitment
        name: savings_plan
        type: subscription
        metric: USD_per_hour_committed
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: see vendor pricing calculator
        userMultiplied: false
    elements:
      - name: Up to 64% discount vs on-demand
      - name: 1-year or 3-year terms
      - name: Applies to Studio notebooks, training, inference
maintainers:
  - name: Kin Lane
    email: kin@apievangelist.com
    url: https://apievangelist.com
  - name: Amazon Web Services
    email: support@aws.amazon.com
    url: https://aws.amazon.com
