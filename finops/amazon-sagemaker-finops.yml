description: 'FOCUS-aligned FinOps for Amazon SageMaker AI: per-ML-instance-hour billing across notebook,
  training, batch transform, real-time, and asynchronous inference, plus serverless inference (GB-second
  + GB-data) and SageMaker Savings Plans for 1- or 3-year commitments.'
