meters:
  - name: notebook_instance_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - region
      - instance_type
      - user
  - name: training_instance_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - region
      - instance_type
      - job_name
  - name: batch_transform_instance_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - region
      - instance_type
      - job_name
  - name: realtime_endpoint_instance_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - region
      - instance_type
      - endpoint_name
      - variant_name
  - name: serverless_inference_gb_seconds
    unit: GB-second
    aggregation: sum
    dimensions:
      - region
      - endpoint_name
  - name: serverless_inference_data_processed_gb
    unit: GB
    aggregation: sum
    dimensions:
      - region
      - endpoint_name
  - name: storage_gb_month
    unit: GB-month
    aggregation: sum
    dimensions:
      - region
      - workload
principles:
  - name: Visibility
    description: Use SageMaker Studio cost dashboards, CloudWatch metrics (Invocations, ModelLatency, CPUUtilization,
      GPUUtilization), and CUR / FOCUS export for per-job and per-endpoint spend.
  - name: Allocation
    description: Tag training jobs, endpoints, notebooks, and Studio profiles with Project, Team, Owner;
      enable cost allocation tags so charges flow into FOCUS columns.
  - name: Optimization
    description: Use Spot training for fault-tolerant jobs, right-size endpoint instance types, scale endpoints
      to zero (Serverless or async) when traffic is sparse, commit to Savings Plans for steady inference,
      use Inferentia/Trainium families for higher price-performance, and stop idle notebooks.
  - name: Accountability
    description: Set AWS Budgets per project tag, alert on training job duration anomalies, and review
      monthly endpoint utilization against InvocationsPerInstance.
