naftiko: 1.0.0-alpha2
info:
  label: Amazon SageMaker ML Lifecycle Management
  description: Unified capability for managing the end-to-end machine learning lifecycle including notebook development, training,
    model management, and endpoint deployment. Used by ML Engineers and Data Scientists.
  tags:
  - Amazon SageMaker
  - Machine Learning
  - MLOps
  - Training
  - Inference
  - AI
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - type: http
    namespace: amazon-sagemaker
    baseUri: https://api.sagemaker.us-east-1.amazonaws.com
    description: Amazon SageMaker control plane API
    authentication:
      type: apikey
      key: Authorization
      value: AWS4-HMAC-SHA256 Credential={{AWS_ACCESS_KEY_ID}}
      placement: header
    resources:
    - name: notebook-instances
      path: /
      description: Notebook instance management operations
      operations:
      - name: create-notebook-instance
        method: POST
        description: Creates an ML compute instance with Jupyter notebook
        inputParameters:
        - name: X-Amz-Target
          in: header
          type: string
          required: true
          description: SageMaker API action target
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describe-notebook-instance
        method: POST
        description: Returns information about a notebook instance
        inputParameters:
        - name: X-Amz-Target
          in: header
          type: string
          required: true
          description: SageMaker API action target
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-notebook-instances
        method: POST
        description: Returns a list of notebook instances
        inputParameters:
        - name: X-Amz-Target
          in: header
          type: string
          required: true
          description: SageMaker API action target
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: training-jobs
      path: /
      description: Training job management operations
      operations:
      - name: create-training-job
        method: POST
        description: Creates a model training job
        inputParameters:
        - name: X-Amz-Target
          in: header
          type: string
          required: true
          description: SageMaker API action target
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describe-training-job
        method: POST
        description: Returns information about a training job
        inputParameters:
        - name: X-Amz-Target
          in: header
          type: string
          required: true
          description: SageMaker API action target
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-training-jobs
        method: POST
        description: Lists training jobs
        inputParameters:
        - name: X-Amz-Target
          in: header
          type: string
          required: true
          description: SageMaker API action target
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: models
      path: /
      description: Model management operations
      operations:
      - name: create-model
        method: POST
        description: Creates a model that you can host at an Amazon SageMaker endpoint
        inputParameters:
        - name: X-Amz-Target
          in: header
          type: string
          required: true
          description: SageMaker API action target
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describe-model
        method: POST
        description: Describes a model
        inputParameters:
        - name: X-Amz-Target
          in: header
          type: string
          required: true
          description: SageMaker API action target
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-models
        method: POST
        description: Lists models created with CreateModel
        inputParameters:
        - name: X-Amz-Target
          in: header
          type: string
          required: true
          description: SageMaker API action target
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: endpoints
      path: /
      description: Endpoint management operations
      operations:
      - name: create-endpoint
        method: POST
        description: Creates an endpoint using the endpoint configuration specified in the request
        inputParameters:
        - name: X-Amz-Target
          in: header
          type: string
          required: true
          description: SageMaker API action target
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describe-endpoint
        method: POST
        description: Returns the description of an endpoint
        inputParameters:
        - name: X-Amz-Target
          in: header
          type: string
          required: true
          description: SageMaker API action target
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-endpoints
        method: POST
        description: Lists endpoints
        inputParameters:
        - name: X-Amz-Target
          in: header
          type: string
          required: true
          description: SageMaker API action target
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: ml-lifecycle-api
    description: Unified REST API for Amazon SageMaker ML lifecycle management.
    resources:
    - path: /v1/notebooks
      name: notebooks
      description: Jupyter notebook instance management for ML development
      operations:
      - method: GET
        name: list-notebooks
        description: List all SageMaker notebook instances
        call: amazon-sagemaker.list-notebook-instances
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-notebook
        description: Create a SageMaker notebook instance for ML development
        call: amazon-sagemaker.create-notebook-instance
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/training-jobs
      name: training-jobs
      description: Model training job management
      operations:
      - method: GET
        name: list-training-jobs
        description: List all SageMaker training jobs
        call: amazon-sagemaker.list-training-jobs
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-training-job
        description: Submit a new model training job
        call: amazon-sagemaker.create-training-job
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/models
      name: models
      description: Trained model artifact management
      operations:
      - method: GET
        name: list-models
        description: List all registered SageMaker models
        call: amazon-sagemaker.list-models
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: register-model
        description: Register a trained model for deployment
        call: amazon-sagemaker.create-model
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/endpoints
      name: endpoints
      description: Model inference endpoint management
      operations:
      - method: GET
        name: list-endpoints
        description: List all SageMaker inference endpoints
        call: amazon-sagemaker.list-endpoints
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: deploy-endpoint
        description: Deploy a model to a SageMaker inference endpoint
        call: amazon-sagemaker.create-endpoint
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: ml-lifecycle-mcp
    transport: http
    description: MCP server for AI-assisted Amazon SageMaker ML lifecycle management.
    tools:
    - name: list-notebook-instances
      description: List SageMaker Jupyter notebook instances for ML development
      hints:
        readOnly: true
        idempotent: true
      call: amazon-sagemaker.list-notebook-instances
      outputParameters:
      - type: object
        mapping: $.
    - name: create-notebook-instance
      description: Create a SageMaker Jupyter notebook instance
      hints:
        readOnly: false
        idempotent: false
      call: amazon-sagemaker.create-notebook-instance
      outputParameters:
      - type: object
        mapping: $.
    - name: list-training-jobs
      description: List SageMaker model training jobs
      hints:
        readOnly: true
        idempotent: true
      call: amazon-sagemaker.list-training-jobs
      outputParameters:
      - type: object
        mapping: $.
    - name: create-training-job
      description: Submit a SageMaker model training job
      hints:
        readOnly: false
        idempotent: false
      call: amazon-sagemaker.create-training-job
      outputParameters:
      - type: object
        mapping: $.
    - name: describe-training-job
      description: Get details about a specific SageMaker training job
      hints:
        readOnly: true
        idempotent: true
      call: amazon-sagemaker.describe-training-job
      outputParameters:
      - type: object
        mapping: $.
    - name: list-models
      description: List registered SageMaker ML models
      hints:
        readOnly: true
        idempotent: true
      call: amazon-sagemaker.list-models
      outputParameters:
      - type: object
        mapping: $.
    - name: create-model
      description: Register a trained model in SageMaker
      hints:
        readOnly: false
        idempotent: false
      call: amazon-sagemaker.create-model
      outputParameters:
      - type: object
        mapping: $.
    - name: list-endpoints
      description: List active SageMaker inference endpoints
      hints:
        readOnly: true
        idempotent: true
      call: amazon-sagemaker.list-endpoints
      outputParameters:
      - type: object
        mapping: $.
    - name: deploy-endpoint
      description: Deploy a model to a SageMaker inference endpoint
      hints:
        readOnly: false
        idempotent: false
      call: amazon-sagemaker.create-endpoint
      outputParameters:
      - type: object
        mapping: $.
    - name: describe-endpoint
      description: Get the status and details of a SageMaker inference endpoint
      hints:
        readOnly: true
        idempotent: true
      call: amazon-sagemaker.describe-endpoint
      outputParameters:
      - type: object
        mapping: $.
